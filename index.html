<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Translate</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <!-- titlebar — drag region -->
    <div id="titlebar" data-tauri-drag-region>
      <div class="titlebar-left">
        <span class="app-name">Translate</span>
        <button id="btn-pin" class="icon-btn active" title="置顶">&#128204;</button>
        <button id="btn-theme" class="icon-btn" title="切换主题">&#127769;</button>
        <button id="btn-settings" class="icon-btn" title="设置">&#9881;</button>
      </div>
      <div class="titlebar-right">
        <button id="btn-close" class="icon-btn btn-close" title="关闭">&#10005;</button>
      </div>
    </div>

    <!-- main content -->
    <div id="main-content">
      <!-- left: input -->
      <div class="panel panel-left">
        <div class="lang-row">
          <select id="source-lang" class="lang-select">
            <option value="auto">自动检测</option>
            <option value="zh-Hans">中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="fr">Francais</option>
            <option value="de">Deutsch</option>
            <option value="es">Espanol</option>
            <option value="ru">Русский</option>
            <option value="pt">Portugues</option>
            <option value="it">Italiano</option>
            <option value="ar">العربية</option>
            <option value="th">ไทย</option>
            <option value="vi">Tiếng Việt</option>
          </select>
        </div>
        <div class="input-wrap">
          <textarea id="input-area" placeholder="输入要翻译的内容..." autofocus></textarea>
          <button id="btn-clear" class="clear-btn hidden" title="清除">&#10005;</button>
        </div>
      </div>

      <!-- swap button -->
      <div class="swap-col">
        <button id="btn-swap" class="icon-btn swap-btn" title="交换语言">&#8644;</button>
      </div>

      <!-- right: output -->
      <div class="panel panel-right">
        <div class="lang-row">
          <select id="target-lang" class="lang-select">
            <option value="en">English</option>
            <option value="zh-Hans">中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="fr">Francais</option>
            <option value="de">Deutsch</option>
            <option value="es">Espanol</option>
            <option value="ru">Русский</option>
            <option value="pt">Portugues</option>
            <option value="it">Italiano</option>
            <option value="ar">العربية</option>
            <option value="th">ไทย</option>
            <option value="vi">Tiếng Việt</option>
          </select>
        </div>
        <div class="output-wrap">
          <div id="output-area" class="output-area" title="点击复制到剪贴板">
            <span class="placeholder">翻译结果</span>
          </div>
          <button id="btn-copy" class="copy-btn hidden" title="复制">&#128203;</button>
        </div>
      </div>
    </div>

    <!-- status bar -->
    <div id="statusbar">
      <span id="detected-lang"></span>
      <span id="char-count">0</span>
      <span id="status-text">就绪</span>
    </div>
  </div>

  <!-- settings modal -->
  <div id="settings-overlay" class="hidden">
    <div id="settings-panel">
      <h3>设置</h3>
      <div class="setting-item">
        <label>默认源语言</label>
        <select id="set-source-lang"></select>
      </div>
      <div class="setting-item">
        <label>默认目标语言</label>
        <select id="set-target-lang"></select>
      </div>
      <div class="setting-item">
        <label>全局快捷键</label>
        <input id="set-shortcut" type="text" placeholder="Ctrl+Shift+T" />
      </div>
      <div class="setting-item">
        <label>开机自启</label>
        <input id="set-autostart" type="checkbox" />
      </div>
      <div class="setting-item">
        <label>Mock 模式</label>
        <input id="set-mock" type="checkbox" />
      </div>
      <div class="setting-item">
        <label>百度 APP ID</label>
        <input id="set-baidu-appid" type="text" placeholder="百度翻译 APP ID" />
      </div>
      <div class="setting-item">
        <label>百度 Key</label>
        <span style="display:flex;align-items:center;gap:4px">
          <input id="set-baidu-key" type="password" placeholder="百度翻译密钥" style="width:148px" />
          <button id="btn-toggle-key" type="button" class="icon-btn" title="显示/隐藏" style="font-size:12px">&#128065;</button>
        </span>
      </div>
      <p id="settings-msg" style="color:var(--danger);font-size:12px;min-height:18px;margin-top:8px;display:none"></p>
      <div class="settings-buttons">
        <button id="btn-save-settings">保存</button>
        <button id="btn-cancel-settings">取消</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
