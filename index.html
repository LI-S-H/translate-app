<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Translate</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <!-- titlebar -->
    <div id="titlebar">
      <div class="titlebar-left">
        <span class="app-name">Translate</span>
        <button id="btn-pin" class="icon-btn active" title="置顶">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-2.7a1 1 0 0 0-.3-.7l-3.7-3.7V4l3-3H6l3 3v5.9L5.3 13.6a1 1 0 0 0-.3.7V17Z"/></svg>
        </button>
        <button id="btn-theme" class="icon-btn" title="切换主题">
          <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button id="btn-settings" class="icon-btn" title="设置">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
      <div class="titlebar-actions">
        <button id="btn-minimize" class="icon-btn" title="最小化">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button id="btn-close" class="icon-btn btn-close" title="关闭">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- main content -->
    <div id="main-content">
      <!-- left: input -->
      <div class="panel panel-left">
        <div class="lang-row">
          <select id="source-lang" class="lang-select">
            <option value="auto">自动检测</option>
            <option value="zh-Hans">中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="fr">Francais</option>
            <option value="de">Deutsch</option>
            <option value="es">Espanol</option>
            <option value="ru">Русский</option>
            <option value="pt">Portugues</option>
            <option value="it">Italiano</option>
            <option value="ar">العربية</option>
            <option value="th">ไทย</option>
            <option value="vi">Tiếng Việt</option>
          </select>
        </div>
        <div class="input-wrap">
          <textarea id="input-area" placeholder="输入要翻译的内容..." autofocus></textarea>
          <button id="btn-clear" class="clear-btn hidden" title="清除">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>

      <!-- swap button -->
      <div class="swap-col">
        <button id="btn-swap" class="icon-btn swap-btn" title="交换语言">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>

      <!-- right: output -->
      <div class="panel panel-right">
        <div class="lang-row">
          <select id="target-lang" class="lang-select">
            <option value="en">English</option>
            <option value="zh-Hans">中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="fr">Francais</option>
            <option value="de">Deutsch</option>
            <option value="es">Espanol</option>
            <option value="ru">Русский</option>
            <option value="pt">Portugues</option>
            <option value="it">Italiano</option>
            <option value="ar">العربية</option>
            <option value="th">ไทย</option>
            <option value="vi">Tiếng Việt</option>
          </select>
        </div>
        <div class="output-wrap">
          <div id="output-area" class="output-area" title="点击复制到剪贴板">
            <span class="placeholder">翻译结果</span>
          </div>
          <button id="btn-copy" class="copy-btn hidden" title="复制">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- status bar -->
    <div id="statusbar">
      <span id="detected-lang"></span>
      <span id="char-count">0</span>
      <span id="status-text">就绪</span>
    </div>
  </div>

  <!-- settings modal -->
  <div id="settings-overlay" class="hidden">
    <div id="settings-panel">
      <h3>设置</h3>
      <div class="setting-item">
        <label>默认源语言</label>
        <select id="set-source-lang"></select>
      </div>
      <div class="setting-item">
        <label>默认目标语言</label>
        <select id="set-target-lang"></select>
      </div>
      <div class="setting-item">
        <label>全局快捷键</label>
        <input id="set-shortcut" type="text" placeholder="Ctrl+Shift+T" />
      </div>
      <div class="setting-item">
        <label>开机自启</label>
        <input id="set-autostart" type="checkbox" />
      </div>
      <div class="setting-item">
        <label>Mock 模式</label>
        <input id="set-mock" type="checkbox" />
      </div>
      <div class="setting-item">
        <label>百度 APP ID</label>
        <input id="set-baidu-appid" type="text" placeholder="百度翻译 APP ID" />
      </div>
      <div class="setting-item">
        <label>百度 Key</label>
        <input id="set-baidu-key" type="password" placeholder="百度翻译密钥" style="width:180px" />
      </div>
      <p id="settings-msg" style="color:var(--danger);font-size:12px;min-height:18px;margin-top:8px;display:none"></p>
      <div class="settings-buttons">
        <button id="btn-save-settings">保存</button>
        <button id="btn-cancel-settings">取消</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
